---
- name: Install PipeWire packages
  ansible.builtin.apt:
    name:
      - pipewire
      - pipewire-pulse
      - wireplumber
    state: present
    install_recommends: false
  become: true
  notify: Restart pipewire-pulse

- name: Create user pipewire config directory
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/pipewire"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0755'
  become: "{{ become_for_target_user }}"

- name: Backup pipewire-pulse config before changes
  ansible.builtin.include_tasks: ../../../tasks/backup_conf_before.yml
  vars:
    conf_path: "/home/{{ target_user }}/.config/pipewire/pipewire-pulse.conf"
    conf_owner: "{{ target_user }}"
    conf_group: "{{ target_user }}"

- name: Deploy pipewire-pulse config
  ansible.builtin.template:
    src: pipewire-pulse.conf.j2
    dest: "/home/{{ target_user }}/.config/pipewire/pipewire-pulse.conf"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'
  become: "{{ become_for_target_user }}"
  notify: Restart pipewire-pulse

- name: Backup pipewire-pulse config after changes
  ansible.builtin.include_tasks: ../../../tasks/backup_conf_after.yml
  vars:
    conf_path: "/home/{{ target_user }}/.config/pipewire/pipewire-pulse.conf"
    conf_owner: "{{ target_user }}"
    conf_group: "{{ target_user }}"

- name: Create user pipewire.conf.d directory
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/pipewire/pipewire.conf.d"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0755'
  become: "{{ become_for_target_user }}"
  when: install_snapclient

- name: Deploy snapcast-discover config
  ansible.builtin.template:
    src: snapcast-discover.conf.j2
    dest: "/home/{{ target_user }}/.config/pipewire/pipewire.conf.d/snapcast-discover.conf"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'
  become: "{{ become_for_target_user }}"
  notify: Restart pipewire-pulse
  when: install_snapclient

- name: Enable user PipeWire services
  ansible.builtin.include_tasks: "../../../tasks/systemd_enable_user.yml"
  vars:
    service_name: "{{ item.name }}"
    wanted_by: "{{ item.wanted_by | default('default.target') }}"
  loop:
    # Sockets ship with [Install] WantedBy=sockets.target — image-mode would
    # otherwise symlink into default.target.wants/ (cf systemd_enable_user.yml).
    - { name: pipewire.socket, wanted_by: sockets.target }
    - { name: pipewire.service }
    - { name: pipewire-pulse.socket, wanted_by: sockets.target }
    - { name: pipewire-pulse.service }
    - { name: wireplumber.service }

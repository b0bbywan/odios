---
- name: Determine if legacy mpDris2 install needs removal
  ansible.builtin.set_fact:
    mpd_mpdris2_remove_legacy: >-
      {{ (ansible_role_name in odios_prior_roles)
         and (odios_prior_role_versions[ansible_role_name] | default('0'))
             is version('2026.4.2b2', '<', version_type='pep440') }}

- name: Remove legacy mpDris2 install (upgrades from <2026.4.2b2)
  when: mpd_mpdris2_remove_legacy | bool
  block:
    - name: Remove legacy mpDris2 binary from /usr/local/bin
      ansible.builtin.file:
        path: /usr/local/bin/mpDris2
        state: absent
      become: true

    - name: Remove legacy mpDris2 systemd override directory
      ansible.builtin.file:
        path: "/usr/lib/systemd/user/mpDris2.service.d"
        state: absent
      become: true

- name: Install mpdris2 v{{ mpd_mpdris2_apt_version }}
  ansible.builtin.apt:
    name:
      - "mpdris2>={{ mpd_mpdris2_apt_version }}"
      - python3-musicbrainzngs
    state: present
    install_recommends: false
  become: true
  notify: Restart mpDris2

- name: Create mpDris2 config directory
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/mpDris2"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0700'
  become: "{{ become_for_target_user }}"
  when: ansible_role_name not in odios_prior_roles

- name: Create mpDris2 config file
  ansible.builtin.template:
    src: mpDris2.conf.j2
    dest: "/home/{{ target_user }}/.config/mpDris2/mpDris2.conf"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0600'
  become: "{{ become_for_target_user }}"
  notify: Restart mpDris2

- name: Enable user mpDris2 service
  ansible.builtin.include_tasks: "../../../tasks/systemd_enable_user.yml"
  vars:
    service_name: mpDris2.service
  when: ansible_role_name not in odios_prior_roles

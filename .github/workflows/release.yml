name: Publish Playbooks

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].*'
  pull_request:

concurrency:
  group: release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  ANSIBLE_CORE_VERSION: '2.19.*'
  ARCHIVE_PREFIX: odio

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      archive_name: ${{ steps.meta.outputs.archive_name }}
      version: ${{ steps.meta.outputs.version }}
      is_release: ${{ steps.meta.outputs.is_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Drift check — role versions match touched files (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --tags origin
          ./scripts/check-role-drift.sh

      - name: Set build metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/[0-9]* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "archive_name=${ARCHIVE_PREFIX}-${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            SHA="${{ github.event.pull_request.head.sha }}"
            VERSION=$(git describe --tags --long --always "${SHA}")
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "archive_name=${ARCHIVE_PREFIX}-dev.tar.gz" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Vendor ansible-core (pure Python)
        run: |
          pip install \
            --target=staging/vendor \
            --no-compile \
            "ansible-core==${{ env.ANSIBLE_CORE_VERSION }}"

          # Collect licenses before stripping dist-info
          mkdir -p staging/licenses
          cp licences/ANSIBLE-LICENSE-GPLv3 staging/licenses/ANSIBLE-LICENSE-GPLv3
          cp LICENSE staging/licenses/ODIOS-LICENSE-BSD2

          # Remove packages with unavoidable native extensions — provided by the system at install time
          rm -rf staging/vendor/cryptography staging/vendor/cryptography-*.dist-info

          # Strip remaining native extensions and bloat
          find staging/vendor -name '*.so' -delete
          find staging/vendor -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          find staging/vendor -type d -name '*.dist-info' -exec rm -rf {} + 2>/dev/null || true

          echo "Vendor size: $(du -sh staging/vendor | cut -f1)"

      - name: Assemble archive
        env:
          GNU_EMAIL: ${{ secrets.GNU_EMAIL }}
        run: |
          # Playbooks
          cp -r installer/ansible staging/ansible

          # Inject secrets
          if [[ -n "${GNU_EMAIL}" ]]; then
            echo "mpd_discplayer_gnu_email: \"${GNU_EMAIL}\"" \
              > staging/ansible/group_vars/all/secrets.yml
          fi

          # Stamp version
          echo "${{ steps.meta.outputs.version }}" > staging/VERSION

          # Build per-release role manifest
          ./scripts/build-manifest.py \
            "${{ steps.meta.outputs.version }}" \
            staging/ansible/roles \
            staging/manifest.json

          tar czf "${{ steps.meta.outputs.archive_name }}" -C staging ansible vendor licenses VERSION manifest.json

          echo "Archive size: $(du -sh ${{ steps.meta.outputs.archive_name }} | cut -f1)"
          echo "Archive contents:"
          tar tzf "${{ steps.meta.outputs.archive_name }}" | head -30

      - uses: actions/upload-artifact@v6
        with:
          name: playbooks-archive
          path: ${{ steps.meta.outputs.archive_name }}
          retention-days: 5

      - uses: actions/upload-artifact@v6
        with:
          name: manifest
          path: staging/manifest.json
          retention-days: 5

  release:
    needs: build
    if: needs.build.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: installer/install.sh
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v7
        with:
          name: playbooks-archive

      - uses: actions/download-artifact@v7
        with:
          name: manifest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ needs.build.outputs.archive_name }}
            installer/install.sh
            manifest.json
          generate_release_notes: true

  pre-release:
    needs: build
    if: needs.build.outputs.is_release == 'false' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: installer/install.sh
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v7
        with:
          name: playbooks-archive

      - uses: actions/download-artifact@v7
        with:
          name: manifest

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pr-${{ github.event.pull_request.number }}
          name: "PR #${{ github.event.pull_request.number }} — ${{ needs.build.outputs.version }}"
          prerelease: true
          make_latest: false
          files: |
            ${{ needs.build.outputs.archive_name }}
            installer/install.sh
            manifest.json
          body: |
            Pre-release automatique pour la PR #${{ github.event.pull_request.number }}.

            **Commit :** `${{ github.event.pull_request.head.sha }}`

  build-test-image:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v5

      - name: Set image tag
        id: meta
        run: |
          if [[ "${{ needs.build.outputs.is_release }}" == "true" ]]; then
            TAG="${{ needs.build.outputs.version }}"
          else
            TAG="${{ github.head_ref }}"
          fi
          echo "image=ghcr.io/${{ github.repository }}/test:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.test
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/test:latest
          cache-to: type=inline

  test-playbook:
    needs: build-test-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run playbook test
        run: ./test.sh
        env:
          REMOTE_IMAGE: ${{ needs.build-test-image.outputs.image }}

      - name: Re-run playbook (idempotence)
        run: ./test.sh rerun

      - name: Clean
        if: always()
        run: ./test.sh clean

  test-playbook-arm:
    needs: build-test-image
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            qemu: false
          - platform: linux/arm/v7
            runner: ubuntu-latest
            qemu: true
          - platform: linux/arm/v6
            runner: ubuntu-latest
            qemu: true
            experimental: true
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v4

      - name: Run playbook test (${{ matrix.platform }})
        run: ./test.sh
        env:
          REMOTE_IMAGE: ${{ needs.build-test-image.outputs.image }}
          PLATFORM: ${{ matrix.platform }}

      - name: Re-run playbook (idempotence)
        run: ./test.sh rerun
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Clean
        if: always()
        run: ./test.sh clean

  test-install:
    needs: [build, build-test-image, pre-release, release]
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      needs.build-test-image.result == 'success' &&
      (needs.pre-release.result == 'success' || needs.release.result == 'success')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mode: [install, install-root]
    steps:
      - uses: actions/checkout@v5

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ needs.build.outputs.is_release }}" == "true" ]]; then
            echo "value=${{ needs.build.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Test curl|bash (${{ matrix.mode }})
        run: ./test.sh ${{ matrix.mode }} ${{ steps.tag.outputs.value }}
        env:
          REMOTE_IMAGE: ${{ needs.build-test-image.outputs.image }}

      - name: Clean
        if: always()
        run: ./test.sh clean

  build-image:
    needs: [build, pre-release, release]
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      (needs.pre-release.result == 'success' || needs.release.result == 'success')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: armhf
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support parted \
            e2fsprogs xz-utils wget psmisc zerofree

      - name: Resolve version tag
        id: tag
        run: |
          if [[ "${{ needs.build.outputs.is_release }}" == "true" ]]; then
            echo "value=${{ needs.build.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        run: |
          sudo ./image-builder/build.sh build \
            --arch ${{ matrix.arch }} \
            --version ${{ steps.tag.outputs.value }} \
            --output ./output

      - name: Upload image to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: output/odio-*.img.xz

      - name: Upload manifest entry
        uses: actions/upload-artifact@v6
        with:
          name: manifest-${{ matrix.arch }}
          path: output/odio-*.json

      - name: Upload image as artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: odio-${{ matrix.arch }}-${{ steps.tag.outputs.value }}
          path: output/odio-*.img.xz

  publish-manifest:
    needs: [build, build-image]
    if: |
      !cancelled() &&
      needs.build-image.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download manifest entries
        uses: actions/download-artifact@v7
        with:
          pattern: manifest-*
          path: entries

      - name: Resolve version tag
        id: tag
        run: |
          if [[ "${{ needs.build.outputs.is_release }}" == "true" ]]; then
            echo "value=${{ needs.build.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge manifest
        run: |
          # Collect all JSON entries into a single os_list
          echo '{"os_list": [' > manifest.json
          first=true
          for f in entries/manifest-*/*.json; do
            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> manifest.json
            fi
            cat "$f" >> manifest.json
          done
          echo ']}' >> manifest.json

          # Pretty-print
          python3 -m json.tool manifest.json > odio.rpi-imager-manifest
          cat odio.rpi-imager-manifest

      - name: Upload manifest to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: odio.rpi-imager-manifest

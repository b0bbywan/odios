---
# Pre-rc3 installs shipped the scripts in ~/.local/bin via the branding role.
# Remove them so the system-wide copy in /usr/local/bin is the only one in PATH.
- name: Remove legacy per-user upgrade scripts
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.local/bin/{{ item }}"
    state: absent
  become: true
  loop:
    - odio-check-upgrade
    - odio-upgrade

# Same story for the systemd units — moved from per-user to /etc/systemd/user/.
- name: Remove legacy per-user upgrade unit files
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/systemd/user/{{ item }}"
    state: absent
  become: true
  loop:
    - odio-check-upgrade.service
    - odio-check-upgrade.timer
    - odio-upgrade.service

- name: Install odio-check-upgrade script
  ansible.builtin.copy:
    src: odio-check-upgrade
    dest: /usr/local/bin/odio-check-upgrade
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Install odio-upgrade script
  ansible.builtin.copy:
    src: odio-upgrade
    dest: /usr/local/bin/odio-upgrade
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Deploy odio-upgrade systemd user units (system-wide)
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/user/{{ item }}"
    owner: root
    group: root
    mode: '0644'
  become: true
  loop:
    - odio-check-upgrade.service
    - odio-check-upgrade.timer
    - odio-upgrade.service

- name: Enable odio-check-upgrade timer
  ansible.builtin.include_tasks: "../../../tasks/systemd_enable_user.yml"
  vars:
    service_name: odio-check-upgrade.timer
    service_unit_path: /etc/systemd/user/odio-check-upgrade.timer

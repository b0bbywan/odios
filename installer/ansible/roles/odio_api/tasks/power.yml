---
# odio_api_existing_cfg is slurped once in main.yml (shared with snapweb reuse).
- name: Detect power capabilities (first install)
  when: ansible_role_name not in odios_prior_roles
  block:
    - name: Set power capability facts (image build)
      ansible.builtin.set_fact:
        odio_api_power_can_reboot: true
        odio_api_power_can_poweroff: true
      when: install_mode == "image"

    - name: Check CanReboot via logind DBus
      ansible.builtin.command: >
        busctl --system call org.freedesktop.login1 /org/freedesktop/login1
        org.freedesktop.login1.Manager CanReboot
      register: odio_api_can_reboot
      changed_when: false
      become: "{{ become_for_target_user }}"
      become_user: "{{ target_user }}"
      ignore_errors: true
      when: install_mode == "live"

    - name: Check CanPoweroff via logind DBus
      ansible.builtin.command: >
        busctl --system call org.freedesktop.login1 /org/freedesktop/login1
        org.freedesktop.login1.Manager CanPowerOff
      register: odio_api_can_poweroff
      changed_when: false
      become: "{{ become_for_target_user }}"
      become_user: "{{ target_user }}"
      ignore_errors: true
      when: install_mode == "live"

    - name: Set power capability facts (live)
      ansible.builtin.set_fact:
        odio_api_power_can_reboot: "{{ '\"yes\"' in odio_api_can_reboot.stdout }}"
        odio_api_power_can_poweroff: "{{ '\"yes\"' in odio_api_can_poweroff.stdout }}"
      when: install_mode == "live"

- name: Reuse power capabilities from existing config (upgrade)
  ansible.builtin.set_fact:
    odio_api_power_can_reboot: "{{ _caps.reboot | default(false) }}"
    odio_api_power_can_poweroff: "{{ _caps.poweroff | default(false) }}"
  vars:
    _cfg: "{{ odio_api_existing_cfg.content | default('') | b64decode | from_yaml | default({}, true) }}"
    _caps: "{{ (_cfg.power | default({})).capabilities | default({}) }}"
  when: ansible_role_name in odios_prior_roles

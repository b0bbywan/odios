---
# Check whether the system boots into a graphical desktop session.
# Sets fact: is_headless (bool) — true when no DE manages the session.
# Variables: none

# Resolve default.target offline (read the symlink) — `systemctl get-default`
# needs the system bus, which isn't running during image-mode builds.
- name: Check systemd default target
  ansible.builtin.shell: >-
    basename "$(readlink /etc/systemd/system/default.target 2>/dev/null ||
    readlink /usr/lib/systemd/system/default.target 2>/dev/null ||
    echo multi-user.target)"
  register: _systemd_default_target
  changed_when: false

- name: Set is_headless fact
  ansible.builtin.set_fact:
    is_headless: "{{ _systemd_default_target.stdout != 'graphical.target' }}"

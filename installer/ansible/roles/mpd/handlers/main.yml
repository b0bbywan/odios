---
- name: Restart mpd
  ansible.builtin.systemd:
    name: "{{ item }}.service"
    state: restarted
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ target_user_uid }}"
  become: true
  become_user: "{{ target_user }}"
  when: install_mode == "live"
  loop:
    - mpd
    - mpDris2

---
- name: Determine if upgrade-role legacy migration is needed
  ansible.builtin.set_fact:
    upgrade_migrate_legacy: >-
      {{ (odios_prior_role_versions[ansible_role_name] | default('0'))
         is version('2026.5.0b1', '<', version_type='pep440') }}

- name: Clean up pre-current-layout upgrade artifacts
  when: upgrade_migrate_legacy | bool
  block:
    - name: Remove legacy per-user upgrade scripts
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.local/bin/{{ item }}"
        state: absent
      become: "{{ become_for_target_user }}"
      loop:
        - odio-check-upgrade
        - odio-upgrade

    - name: Remove legacy per-user upgrade unit files
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.config/systemd/user/{{ item }}"
        state: absent
      become: "{{ become_for_target_user }}"
      loop:
        - odio-check-upgrade.service
        - odio-check-upgrade.timer
        - odio-upgrade.service

    - name: Remove legacy timer wants symlink
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.config/systemd/user/default.target.wants/odio-check-upgrade.timer"
        state: absent
      become: "{{ become_for_target_user }}"

    - name: Remove legacy odio-check-upgrade script
      ansible.builtin.file:
        path: /usr/local/bin/odio-check-upgrade
        state: absent
      become: true

- name: Install odio-upgrade script
  ansible.builtin.copy:
    src: odio_upgrade.py
    dest: /usr/local/bin/odio-upgrade
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Deploy odio-upgrade systemd user units (system-wide)
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/user/{{ item }}"
    owner: root
    group: root
    mode: '0644'
  become: true
  loop:
    - odio-check-upgrade.service
    - odio-check-upgrade.timer
    - odio-upgrade.service

- name: Enable odio-check-upgrade timer
  ansible.builtin.include_tasks: "../../../tasks/systemd_enable_user.yml"
  vars:
    service_name: odio-check-upgrade.timer
    service_unit_path: /etc/systemd/user/odio-check-upgrade.timer
    wanted_by: timers.target
  when: upgrade_migrate_legacy | bool

- name: Install unattended-upgrades (image mode)
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
    install_recommends: false
  become: true
  when: install_mode == "image"

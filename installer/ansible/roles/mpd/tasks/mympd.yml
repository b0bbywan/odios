---
- name: Install mympd v{{ mpd_mympd_apt_version }}
  ansible.builtin.apt:
    name: "mympd>={{ mpd_mympd_apt_version }}"
    state: present
    install_recommends: false
  become: true
  notify: Restart mympd

- name: Create mympd config directory
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/mympd/config"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0700'
  become: true

- name: Deploy odio custom_css
  ansible.builtin.copy:
    src: custom_css
    dest: "/home/{{ target_user }}/.config/mympd/config/custom_css"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0600'
  become: true
  notify: Restart mympd

- name: Disable mympd ssl
  ansible.builtin.copy:
    content: "false"
    dest: "/home/{{ target_user }}/.config/mympd/config/ssl"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0600'
  become: true
  notify: Restart mympd

- name: Create mympd state directory
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/mympd/state"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0700'
  become: true

# myMPD autoconfigures its MPD connection by probing ${XDG_RUNTIME_DIR}/mpd/socket
# (the standard user socket now created by the mpd.socket unit). Clear any stale
# host/port left by older installs that pinned the legacy /run/user/UID/mpd.socket
# path, so autoconf re-runs on next start. myMPD must be stopped first — it
# rewrites state/ on shutdown, so a plain restart would just re-pin the old
# value. Only act when a legacy pin is actually present.
- name: Check for stale mympd MPD host pin
  ansible.builtin.stat:
    path: "/home/{{ target_user }}/.config/mympd/state/mpd_host"
  register: mpd_mympd_stale_host
  become: true

- name: Stop mympd before clearing stale MPD pin
  ansible.builtin.include_tasks: "../../../tasks/systemd_stop_user.yml"
  vars:
    service_name: mympd.service
  when: mpd_mympd_stale_host.stat.exists

- name: Remove stale mympd MPD host/port
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/mympd/state/{{ item }}"
    state: absent
  become: true
  loop:
    - mpd_host
    - mpd_port
  notify: Restart mympd

- name: Configure mympd http port
  ansible.builtin.copy:
    content: "{{ mpd_mympd_http_port }}"
    dest: "/home/{{ target_user }}/.config/mympd/config/http_port"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0600'
  become: true
  notify: Restart mympd

- name: Enable user mympd service
  ansible.builtin.include_tasks: "../../../tasks/systemd_enable_user.yml"
  vars:
    service_name: mympd.service

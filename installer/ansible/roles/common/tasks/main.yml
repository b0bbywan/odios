---
- name: Check odio gpg file
  ansible.builtin.stat:
    path: "{{ gpg_file }}"
  register: common_gpg_stat

- name: Add apt.odio.love gpg key
  ansible.builtin.get_url:
    url: "{{ odio_gpg }}"
    dest: /tmp/odio.gpg
    mode: '0644'
  when: not common_gpg_stat.stat.exists

- name: Dearmor GPG key
  ansible.builtin.command:
    cmd: "gpg --dearmor -o {{ gpg_file }} /tmp/odio.gpg"
    creates: "{{ gpg_file }}"
  become: true

- name: Copy odio apt source
  ansible.builtin.template:
    src: odio.sources.j2
    dest: /etc/apt/sources.list.d/odio.sources
    mode: '0644'
    owner: root
    group: root
  become: true

# Single apt update for the whole playbook — covers system repos + the odio
# source added just above. Later roles must NOT set `update_cache: true`
# (exception: upmpdcli, which adds its own ppa mid-playbook).
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  become: true

# acl is required by ansible-core's `become_user` when the invoking user, root,
# and target_user are three different identities — ansible drops tmp files via
# setfacl, and falls back to the BSD `chmod +a` syntax (invalid on Linux) when
# the package is absent.
- name: Install acl (needed by become_user)
  ansible.builtin.apt:
    name: acl
    state: present
  become: true

- name: Ensure required groups exist
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  become: true
  loop:
    - audio
    - input
    - plugdev

- name: Ensure user in audio group
  ansible.builtin.user:
    name: "{{ target_user }}"
    append: true
    groups:
      - audio
      - users
      - input
      - plugdev
      - systemd-journal
  become: true

- name: User systemd directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0755'
  become: true
  loop:
    - "/home/{{ target_user }}/.config/systemd/user"
    - "/home/{{ target_user }}/.config/systemd/user/default.target.wants"

- name: Check linger status
  ansible.builtin.stat:
    path: "/var/lib/systemd/linger/{{ target_user }}"
  register: common_linger_stat

- name: Enable user session persistence (linger) - live
  ansible.builtin.command:
    cmd: "loginctl enable-linger {{ target_user }}"
  become: true
  changed_when: true
  when:
    - not common_linger_stat.stat.exists
    - install_mode == "live"

- name: Ensure linger directory exists - image build
  ansible.builtin.file:
    path: /var/lib/systemd/linger
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  when:
    - not common_linger_stat.stat.exists
    - install_mode == "image"

- name: Enable user session persistence (linger) - image build
  ansible.builtin.file:
    path: "/var/lib/systemd/linger/{{ target_user }}"
    state: touch
    mode: '0644'
    modification_time: preserve
    access_time: preserve
  become: true
  when:
    - not common_linger_stat.stat.exists
    - install_mode == "image"

- name: Setup polkit
  ansible.builtin.include_tasks: polkit.yml

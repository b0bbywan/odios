---
- name: Install Bluetooth packages
  ansible.builtin.apt:
    name:
      - bluez
      - pulseaudio-module-bluetooth
      - rfkill
    state: present
    install_recommends: false
  become: true
  notify: Restart bluetooth

- name: Ensure bluetooth group exists
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  become: true
  loop:
    - bluetooth
    - rfkill

- name: Ensure user in bluetooth group
  ansible.builtin.user:
    name: "{{ target_user }}"
    append: true
    groups:
      - bluetooth
      - rfkill
  become: true

- name: Backup Bluetooth config before changes
  ansible.builtin.include_tasks: "../../../tasks/backup_conf_before.yml"
  vars:
    conf_path: /etc/bluetooth/main.conf

- name: Configure Bluetooth main.conf
  ansible.builtin.template:
    src: bluetooth-main.conf.j2
    dest: /etc/bluetooth/main.conf
    mode: '0644'
  become: true
  notify: Restart bluetooth

- name: Backup Bluetooth config after changes
  ansible.builtin.include_tasks: "../../../tasks/backup_conf_after.yml"
  vars:
    conf_path: /etc/bluetooth/main.conf

- name: Check for graphical session
  ansible.builtin.include_tasks: "../../../tasks/check_graphical_session.yml"

- name: Deploy rfkill udev rule
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/60-rfkill.rules
    content: |
      KERNEL=="rfkill", GROUP="rfkill", MODE="0664"
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Reload udev rules
  when: is_headless or install_mode == "image"

- name: Enable Bluetooth service
  ansible.builtin.include_tasks: "../../../tasks/systemd_enable_system.yml"
  vars:
    service_name: bluetooth.service

- name: Unblock bluetooth via rfkill
  ansible.builtin.command: rfkill unblock bluetooth
  become: true
  changed_when: false
  when: install_mode == "live"

---
- name: Install MPD packages
  ansible.builtin.apt:
    name:
      - mpd
      - mpc
    state: present
    install_recommends: false
  become: true
  when: ansible_role_name not in odios_prior_roles

- name: Install mpDris2 fork
  ansible.builtin.include_tasks: mpdris2.yml

- name: Install myMPD web UI
  ansible.builtin.include_tasks: mympd.yml
  when: install_mympd | bool

- name: Disable system MPD service
  ansible.builtin.include_tasks: "../../../tasks/systemd_disable_system.yml"
  vars:
    service_name: "{{ item }}"
  loop:
    - mpd.service
    - mpd.socket
  when: ansible_role_name not in odios_prior_roles

- name: MPD directories (first install)
  when: ansible_role_name not in odios_prior_roles
  block:
    - name: Create MPD config directory
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.config/mpd"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0700'
      become: "{{ become_for_target_user }}"

    - name: Create MPD data directories
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.local/share/mpd/{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0700'
      become: "{{ become_for_target_user }}"
      loop:
        - playlists
        - cache

- name: Backup MPD config before changes
  ansible.builtin.include_tasks: "../../../tasks/backup_conf_before.yml"
  vars:
    conf_path: "/home/{{ target_user }}/.config/mpd/mpd.conf"
    conf_mode: '0600'
    conf_owner: "{{ target_user }}"
    conf_group: "{{ target_user }}"

- name: Create empty MPD config file
  ansible.builtin.copy:
    content: ""
    dest: "/home/{{ target_user }}/.config/mpd/mpd.conf"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0600'
    force: false
  become: "{{ become_for_target_user }}"
  when: ansible_role_name not in odios_prior_roles

- name: MPD config - paths
  ansible.builtin.blockinfile:
    path: "/home/{{ target_user }}/.config/mpd/mpd.conf"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - paths"
    block: |
      music_directory         "{{ mpd_music_directory }}"
      playlist_directory      "~/.local/share/mpd/playlists"
      database {
          plugin "simple"
          path "~/.local/share/mpd/db"
          cache_directory "~/.local/share/mpd/cache"
      }
      state_file              "~/.local/share/mpd/state"
      sticker_file            "~/.local/share/mpd/sticker.sql"
      auto_update             "yes"
  become: "{{ become_for_target_user }}"
  become_user: "{{ target_user }}"
  notify: Restart mpd

# Listeners (unix socket + TCP 6600) are owned by the packaged mpd.socket
# user unit (ListenStream=%t/mpd/socket, ListenStream=6600). MPD inherits them
# via socket activation, so no bind_to_address/port belongs in mpd.conf. Drop
# the old managed network block from previously-installed configs to avoid a
# double-bind ("address already in use") against the socket unit.
- name: Determine if legacy MPD network block needs removal
  ansible.builtin.set_fact:
    mpd_drop_legacy_network: >-
      {{ (ansible_role_name in odios_prior_roles)
         and (odios_prior_role_versions[ansible_role_name] | default('0'))
             is version('2026.5.0b2', '<', version_type='pep440') }}

- name: MPD config - drop legacy network block
  ansible.builtin.blockinfile:
    path: "/home/{{ target_user }}/.config/mpd/mpd.conf"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - network"
    state: absent
  become: "{{ become_for_target_user }}"
  become_user: "{{ target_user }}"
  notify: Restart mpd
  when: mpd_drop_legacy_network | bool

- name: MPD config - zeroconf
  ansible.builtin.blockinfile:
    path: "/home/{{ target_user }}/.config/mpd/mpd.conf"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - zeroconf"
    block: |
      zeroconf_enabled        "yes"
      zeroconf_name           "Mpd-%h"
  become: "{{ become_for_target_user }}"
  become_user: "{{ target_user }}"
  notify: Restart mpd

- name: MPD config - wildmidi decoder
  ansible.builtin.blockinfile:
    path: "/home/{{ target_user }}/.config/mpd/mpd.conf"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - decoder wildmidi"
    block: |
      decoder {
             enabled                  "no"
             plugin                   "wildmidi"
             config_file              "/etc/timidity/timidity.cfg"
      }
  become: "{{ become_for_target_user }}"
  become_user: "{{ target_user }}"
  notify: Restart mpd

- name: MPD config - pulseaudio output
  ansible.builtin.blockinfile:
    path: "/home/{{ target_user }}/.config/mpd/mpd.conf"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - output pulseaudio"
    block: |
      audio_output {
          type        "pulse"
          name        "pulseaudio"
      }
  become: "{{ become_for_target_user }}"
  become_user: "{{ target_user }}"
  notify: Restart mpd

# Optional user-local overrides (~/.config/mpd/mpd_local.conf), parsed last.
- name: MPD config - local override include
  ansible.builtin.blockinfile:
    path: "/home/{{ target_user }}/.config/mpd/mpd.conf"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - local include"
    block: |
      include_optional "mpd_local.conf"
  become: "{{ become_for_target_user }}"
  become_user: "{{ target_user }}"
  notify: Restart mpd

- name: Backup MPD config after changes
  ansible.builtin.include_tasks: "../../../tasks/backup_conf_after.yml"
  vars:
    conf_path: "/home/{{ target_user }}/.config/mpd/mpd.conf"
    conf_mode: '0600'
    conf_owner: "{{ target_user }}"
    conf_group: "{{ target_user }}"

- name: MPD state file and music directory (first install)
  when: ansible_role_name not in odios_prior_roles
  block:
    - name: Create empty MPD state file
      ansible.builtin.copy:
        content: ""
        dest: "/home/{{ target_user }}/.local/share/mpd/state"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0644'
        force: false
      become: "{{ become_for_target_user }}"

    - name: Create music directory
      ansible.builtin.file:
        path: "{{ mpd_music_directory }}"
        state: directory
        owner: "{{ target_user }}"
        group: audio
        mode: '0775'
      become: true

- name: Enable user MPD service
  ansible.builtin.include_tasks: "../../../tasks/systemd_enable_user.yml"
  vars:
    service_name: mpd.service
  when: ansible_role_name not in odios_prior_roles

# mpd.socket (socket activation) shipped in 2026.5.0b2 — enable on older upgrades too.
- name: Enable user MPD socket
  ansible.builtin.include_tasks: "../../../tasks/systemd_enable_user.yml"
  vars:
    service_name: mpd.socket
    wanted_by: sockets.target
  when: (odios_prior_role_versions[ansible_role_name] | default('0'))
        is version('2026.5.0b2', '<', version_type='pep440')

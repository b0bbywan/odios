---
- name: Install go-odio-api v{{ odio_api_apt_version }}
  ansible.builtin.apt:
    name: "odio-api>={{ odio_api_apt_version }}"
    state: present
    install_recommends: false
  become: true
  notify: Restart odio-api

- name: Create odio-api config directory
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/odio-api"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0700'
  become: "{{ become_for_target_user }}"
  when: ansible_role_name not in odios_prior_roles

- name: Create odio-api conf.d directory
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/odio-api/conf.d"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0700'
  become: "{{ become_for_target_user }}"

- name: Deploy polkit shutdown rule
  ansible.builtin.template:
    src: 10-allow-shutdown.rules.j2
    dest: /etc/polkit-1/rules.d/10-allow-shutdown.rules
    owner: root
    group: root
    mode: '0644'
  become: true
  when: is_headless or install_mode == "image"

- name: Read existing odio-api config
  ansible.builtin.slurp:
    src: "/home/{{ target_user }}/.config/odio-api/config.yaml"
  register: odio_api_existing_cfg
  failed_when: false
  become: "{{ become_for_target_user }}"

- name: Resolve power capabilities
  ansible.builtin.include_tasks: power.yml

- name: Resolve snapweb URL for systemd block
  ansible.builtin.include_tasks: snapweb_url.yml
  when:
    - install_mode == "live"
    - install_snapclient

- name: Deploy odio-api configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "/home/{{ target_user }}/.config/odio-api/config.yaml"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0640'
  become: "{{ become_for_target_user }}"
  notify: Restart odio-api

- name: Deploy odio-api systemd reference (conf.d/.default)
  ansible.builtin.template:
    src: 10-systemd.yml.default.j2
    dest: "/home/{{ target_user }}/.config/odio-api/conf.d/10-systemd.yml.default"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0640'
  become: "{{ become_for_target_user }}"

- name: Enable odio-api service
  ansible.builtin.include_tasks: "../../../tasks/systemd_enable_user.yml"
  vars:
    service_name: odio-api.service

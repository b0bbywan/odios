---
- name: Install go-odio-api
  ansible.builtin.apt:
    name: odio-api
    state: present
    install_recommends: false
  become: true
  register: odio_api_install
  notify: Restart odio-api

- name: Upgrade go-odio-api
  ansible.builtin.apt:
    name: odio-api
    only_upgrade: true
  become: true
  notify: Restart odio-api
  when: not odio_api_install.changed

- name: Create odio-api config directory
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/odio-api"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0700'
  become: true

- name: Check for graphical session
  ansible.builtin.include_tasks: "../../../tasks/check_graphical_session.yml"

- name: Deploy polkit shutdown rule
  ansible.builtin.template:
    src: 10-allow-shutdown.rules.j2
    dest: /etc/polkit-1/rules.d/10-allow-shutdown.rules
    owner: root
    group: root
    mode: '0644'
  become: true
  when: is_headless or install_mode == "image"

- name: Set power capability facts (image build)
  ansible.builtin.set_fact:
    odio_api_power_can_reboot: true
    odio_api_power_can_poweroff: true
  when: install_mode == "image"

- name: Check CanReboot via logind DBus
  ansible.builtin.command: >
    busctl --system call org.freedesktop.login1 /org/freedesktop/login1
    org.freedesktop.login1.Manager CanReboot
  register: odio_api_can_reboot
  changed_when: false
  become: true
  become_user: "{{ target_user }}"
  ignore_errors: true
  when: install_mode == "live"

- name: Check CanPoweroff via logind DBus
  ansible.builtin.command: >
    busctl --system call org.freedesktop.login1 /org/freedesktop/login1
    org.freedesktop.login1.Manager CanPowerOff
  register: odio_api_can_poweroff
  changed_when: false
  become: true
  become_user: "{{ target_user }}"
  ignore_errors: true
  when: install_mode == "live"

- name: Set power capability facts (live)
  ansible.builtin.set_fact:
    odio_api_power_can_reboot: "{{ '\"yes\"' in odio_api_can_reboot.stdout }}"
    odio_api_power_can_poweroff: "{{ '\"yes\"' in odio_api_can_poweroff.stdout }}"
  when: install_mode == "live"

- name: Backup odio-api config before changes
  ansible.builtin.include_tasks: "../../../tasks/backup_conf_before.yml"
  vars:
    conf_path: "/home/{{ target_user }}/.config/odio-api/config.yaml"
    conf_owner: "{{ target_user }}"
    conf_group: "{{ target_user }}"
    conf_mode: '0640'

- name: Deploy odio-api configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "/home/{{ target_user }}/.config/odio-api/config.yaml"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0640'
  become: true
  notify: Restart odio-api

- name: Backup odio-api config after changes
  ansible.builtin.include_tasks: "../../../tasks/backup_conf_after.yml"
  vars:
    conf_path: "/home/{{ target_user }}/.config/odio-api/config.yaml"
    conf_owner: "{{ target_user }}"
    conf_group: "{{ target_user }}"
    conf_mode: '0640'

- name: Enable odio-api service
  ansible.builtin.include_tasks: "../../../tasks/systemd_enable_user.yml"
  vars:
    service_name: odio-api.service

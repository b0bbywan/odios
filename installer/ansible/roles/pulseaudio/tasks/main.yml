---
- name: Install PulseAudio packages
  ansible.builtin.apt:
    name:
      - pulseaudio
      - pulseaudio-module-zeroconf
    state: present
    install_recommends: false
  become: true
  notify: Restart pulseaudio

- name: Copy pulse-tcp script
  ansible.builtin.copy:
    src: pulse-tcp.sh
    dest: /usr/local/bin/pulse-tcp.sh
    mode: '0755'
    owner: root
    group: root
  become: true
  notify: Restart pulse-tcp

- name: Deploy pulse-tcp service
  ansible.builtin.copy:
    src: pulse-tcp.service
    dest: "/usr/lib/systemd/user/pulse-tcp.service"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'
  become: true
  notify: Restart pulse-tcp

- name: Check if pipewire is installed
  ansible.builtin.command: dpkg-query -W -f='${Status}' pipewire
  register: pulseaudio_pw_status
  failed_when: false
  changed_when: false

- name: Find existing PipeWire unit files
  ansible.builtin.stat:
    path: "/usr/lib/systemd/user/{{ item }}"
  register: pulseaudio_pw_units
  loop:
    - pipewire.service
    - pipewire.socket
    - pipewire-pulse.service
    - pipewire-pulse.socket
    - wireplumber.service
  when: "'install ok installed' in pulseaudio_pw_status.stdout"

- name: Disable and stop existing PipeWire units for target user
  ansible.builtin.include_tasks: "../../../tasks/systemd_disable_user.yml"
  vars:
    service_name: "{{ item.item }}"
  loop: "{{ pulseaudio_pw_units.results }}"
  when:
    - pulseaudio_pw_units is defined
    - item.stat is defined
    - item.stat.exists

- name: Mask existing PipeWire units for target user
  ansible.builtin.include_tasks: "../../../tasks/systemd_mask_user.yml"
  vars:
    service_name: "{{ item.item }}"
  loop: "{{ pulseaudio_pw_units.results }}"
  when:
    - pulseaudio_pw_units is defined
    - item.stat is defined
    - item.stat.exists

- name: Enable user PulseAudio services
  ansible.builtin.include_tasks: "../../../tasks/systemd_enable_user.yml"
  vars:
    service_name: "{{ item }}"
  loop:
    - pulseaudio.service
    - pulse-tcp.service

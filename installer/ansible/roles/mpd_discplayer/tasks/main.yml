---
# When MPD is managed by odios, the conf path is known and already backed up by the mpd role.
# When MPD is external, we detect it and back up its config ourselves.

- name: Set MPD config path (managed by odios)
  ansible.builtin.set_fact:
    mpd_conf_path: "/home/{{ target_user }}/.config/mpd/mpd.conf" # noqa: var-naming[no-role-prefix]
  when: install_mpd | bool

- name: Validate external MPD installation
  ansible.builtin.include_tasks: validate_external_mpd.yml
  when: not (install_mpd | bool)

- name: CD-ROM group (first install)
  when: ansible_role_name not in odios_prior_roles
  block:
    - name: Ensure cdrom group exists
      ansible.builtin.group:
        name: cdrom
        state: present
      become: true

    - name: Ensure user in cdrom group
      ansible.builtin.user:
        name: "{{ target_user }}"
        append: true
        groups:
          - cdrom
      become: true

# Headless/image only, and only on installs predating the rule (mpd_discplayer 2026.4.0rc7).
- name: Determine if udisk polkit rule needs deploying
  ansible.builtin.set_fact:
    mpd_discplayer_deploy_polkit: >-
      {{ (is_headless or install_mode == "image")
         and (odios_prior_role_versions[ansible_role_name] | default('0'))
             is version('2026.4.0rc7', '<', version_type='pep440') }}

- name: Deploy udisk polkit rule
  ansible.builtin.template:
    src: mpd-udisks.rules.j2
    dest: "/etc/polkit-1/rules.d/80-mpd-udisks.rules"
    owner: "root"
    group: "root"
    mode: '0644'
  become: true
  when: mpd_discplayer_deploy_polkit | bool

- name: MPD config for disc player (first install)
  when: ansible_role_name not in odios_prior_roles
  block:
    - name: Backup MPD config before changes (external MPD only)
      ansible.builtin.include_tasks: "../../../tasks/backup_conf_before.yml"
      vars:
        conf_path: "{{ mpd_conf_path }}"
        conf_mode: '0600'
        conf_owner: "{{ target_user }}"
        conf_group: "{{ target_user }}"
      when: not (install_mpd | bool)

    - name: Configure mpd cdio
      ansible.builtin.blockinfile:
        path: "{{ mpd_conf_path }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - cdio input"
        block: |
          # Input plugins
          input {
            plugin  "cdio_paranoia"
            speed "12"
          }
      become: "{{ become_for_target_user }}"
      become_user: "{{ target_user }}"
      notify: Restart mpd

    - name: Configure mpd playlist plugin
      ansible.builtin.blockinfile:
        path: "{{ mpd_conf_path }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - playlist plugin"
        block: |
          # Playlist plugins
          playlist_plugin {
            name "cue"
            enabled "true"
            as_directory "true"
          }
      become: "{{ become_for_target_user }}"
      become_user: "{{ target_user }}"
      notify: Restart mpd

    - name: Configure mpd udisk neighbor
      ansible.builtin.blockinfile:
        path: "{{ mpd_conf_path }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - udisk neighbor"
        block: |
          # Neighbors - USB device discovery
          neighbors {
            plugin "udisks"
          }
      become: "{{ become_for_target_user }}"
      become_user: "{{ target_user }}"
      notify: Restart mpd

    - name: Backup MPD config after changes (external MPD only)
      ansible.builtin.include_tasks: "../../../tasks/backup_conf_after.yml"
      vars:
        conf_path: "{{ mpd_conf_path }}"
        conf_mode: '0600'
        conf_owner: "{{ target_user }}"
        conf_group: "{{ target_user }}"
      when: not (install_mpd | bool)

- name: Install mpd-discplayer v{{ mpd_discplayer_apt_version }}
  ansible.builtin.apt:
    name: "mpd-discplayer>={{ mpd_discplayer_apt_version }}"
    state: present
    install_recommends: false
  become: true
  notify: Restart mpd-discplayer

- name: MPD-discplayer scaffolding (first install)
  when: ansible_role_name not in odios_prior_roles
  block:
    - name: Copy .mpdignore to music directory
      ansible.builtin.copy:
        src: .mpdignore
        dest: "{{ mpd_music_directory }}/.mpdignore"
        mode: '0644'
        owner: "{{ target_user }}"
        group: audio
      become: true

    - name: Create mpd-discplayer config directory
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.config/mpd-discplayer"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0700'
      become: "{{ become_for_target_user }}"

- name: Deploy mpd-discplayer configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "/home/{{ target_user }}/.config/mpd-discplayer/config.yaml"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'
  become: "{{ become_for_target_user }}"
  notify: Restart mpd-discplayer

- name: Enable mpd-discplayer service
  ansible.builtin.include_tasks: "../../../tasks/systemd_enable_user.yml"
  vars:
    service_name: mpd-discplayer.service
  when: ansible_role_name not in odios_prior_roles

---
- name: Odio Streamer Installation
  hosts: localhost

  vars_files:
    - group_vars/all.yml

  pre_tasks:
    - name: Ensure install_mode is valid
      ansible.builtin.fail:
        msg: "install_mode must be 'live' or 'image', got: '{{ install_mode }}'"
      when: install_mode not in ["live", "image"]

    - name: Ensure target user is not root
      ansible.builtin.fail:
        msg: "target_user must not be root"
      when: target_user == "root"

    - name: Ensure dbus running
      ansible.builtin.systemd:
        name: dbus.service
        state: started
      become: true
      when: install_mode == "live"

    - name: Set hostname
      ansible.builtin.include_tasks: "tasks/set_hostname.yml"
      when: target_hostname | length > 0

    - name: Create target user
      ansible.builtin.user:
        name: "{{ target_user }}"
        shell: /bin/bash
        create_home: true
        state: present
      become: true
      when: target_user != ansible_user_id

    - name: Create ansible remote_tmp directory
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.ansible/tmp"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0700'
      become: true

    - name: Get target user UID
      ansible.builtin.command:
        cmd: "id -u {{ target_user }}"
      register: common_user_uid_result
      changed_when: false

    - name: Detect variables
      ansible.builtin.set_fact:
        system_arch: "{{ ansible_architecture }}"
        target_user_uid: "{{ common_user_uid_result.stdout }}"

    # Sets `is_headless` once for the whole run — bluetooth, odio_api, and
    # mpd_discplayer all consume it to decide between graphical and headless
    # polkit/udev policies. Lifted out of individual roles so smart-upgrade
    # skipping bluetooth+odio_api doesn't leave the fact unset for
    # mpd_discplayer (or any future consumer).
    - name: Detect graphical session
      ansible.builtin.include_tasks: "tasks/check_graphical_session.yml"

  # TODO(smart-upgrade): drop the redundant `Check for graphical session`
  # include in the bluetooth role on the next bluetooth_version bump.
  # TODO(smart-upgrade): pin mpd_discplayer apt version on the next
  # mpd_discplayer_version bump.
  # TODO(smart-upgrade): pin spotifyd apt version on the next
  # spotifyd_version bump.
  roles:
    - role: common
    - role: upgrade
    - role: branding
      when: run_branding | bool
    - role: pulseaudio
      when: run_pulseaudio | bool
    - role: bluetooth
      when: run_bluetooth | bool
    - role: mpd
      when: run_mpd | bool
    - role: mpd_discplayer
      when: run_mpd_discplayer | bool
    - role: shairport_sync
      when: run_shairport_sync | bool
    - role: snapclient
      when: run_snapclient | bool
    - role: upmpdcli
      when: run_upmpdcli | bool
    - role: spotifyd
      when: run_spotifyd | bool
    - role: odio_api
      when: run_odio_api | bool

  post_tasks:
    - name: Write installation state
      ansible.builtin.include_tasks: "tasks/write_state.yml"

    - name: Restart odio-api
      ansible.builtin.include_tasks: "tasks/restart_odio_api.yml"

    - name: Verify services are running
      ansible.builtin.include_tasks: "tasks/verify_services.yml"

    # Last — write_state.yml runs `odio-upgrade check` as target_user, which
    # ansible needs the per-user tmp dir for. Removing it earlier would just
    # cause ansible to recreate it (with a warning).
    - name: Remove ansible remote_tmp directory
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.ansible/tmp"
        state: absent
      become: true

    - name: Display installation summary
      ansible.builtin.debug:
        msg:
          - "═══════════════════════════════════════════════════"
          - "  odio Streaming System - Installation Complete  "
          - "═══════════════════════════════════════════════════"
          - ""
          - "Hostname: {{ target_hostname }}"
          - "User: {{ target_user }}"
          - ""
          - "Services installed:"
          - "  {{ '✓' if install_pulseaudio else '✗' }} PulseAudio with network streaming"
          - "  {{ '✓' if install_bluetooth else '✗' }} Bluetooth audio (A2DP sink)"
          - "  {{ '✓' if install_mpd else '✗' }} MPD (Music Player Daemon)"
          - "  {{ '✓' if install_odio_api else '✗' }} Odio API (REST control interface)"
          - "  {{ '✓' if install_mpd_discplayer else '✗' }} MPD disc player"
          - "  {{ '✓' if install_shairport_sync else '✗' }} Shairport Sync (AirPlay)"
          - "  {{ '✓' if install_snapclient else '✗' }} Snapcast client"
          - "  {{ '✓' if install_upmpdcli else '✗' }} UPnP/DLNA renderer"
          - "  {{ '✓' if install_upnpwebradios else '✗' }} UPnP web radios"
          - "  {{ '✓' if install_spotifyd else '✗' }} Spotifyd (Spotify Connect)"
          - "  {{ '✓' if install_mympd else '✗' }} myMPD (web UI)"
          - ""
          - "System should already be running !"
          - "Visit http://localhost:8018/ui"
          - ""
          - "═══════════════════════════════════════════════════"

---
# Optional roles = filesystem-listed roles with a matching install_<name>
# in vars. common/upgrade are infrastructure (always run, never listed);
# unwired roles (no install_<name>) are filtered out.
- name: List role directories
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/roles"
    file_type: directory
    recurse: false
  register: _odios_role_dirs

- name: Build optional role list (excludes common/upgrade and unwired roles)
  ansible.builtin.set_fact:
    _odios_optional_roles: "{{ (_odios_optional_roles | default([])) + [item] }}"
  loop: "{{ _odios_role_dirs.files | map(attribute='path') | map('basename') | difference(['common', 'upgrade']) | sort }}"
  when: ('install_' ~ item) in vars

- name: Build list of installed roles
  ansible.builtin.set_fact:
    _odios_installed_roles: "{{ (_odios_installed_roles | default(['common', 'upgrade'])) + [item] }}"
  loop: "{{ _odios_optional_roles }}"
  when: lookup('vars', 'install_' ~ item) | bool

# Track opt-outs so upgrades can distinguish "user said no" from "role
# didn't exist yet" (latter falls back to install.sh's default).
- name: Build list of excluded roles
  ansible.builtin.set_fact:
    _odios_excluded_roles: "{{ _odios_optional_roles | difference(_odios_installed_roles) }}"

# Same split for sub-flags. Pure opt-out semantics on upgrade: only
# features_excluded maps to N; everything else gets Y.
- name: Build list of enabled features
  ansible.builtin.set_fact:
    _odios_enabled_features: >-
      {{
        (['tidal']         if install_tidal         | bool else [])
        + (['qobuz']         if install_qobuz         | bool else [])
        + (['upnpwebradios'] if install_upnpwebradios | bool else [])
        + (['mympd']         if install_mympd         | bool else [])
      }}

- name: Build list of excluded features
  ansible.builtin.set_fact:
    _odios_excluded_features: >-
      {{
        ['tidal', 'qobuz', 'upnpwebradios', 'mympd']
        | difference(_odios_enabled_features)
      }}

# /var/lib: state.json (root-only writes, group read). /var/cache:
# upgrades.json (setgid + group-write so target_user can refresh via
# `odio-upgrade check`). target_user joins `odio` in the common role.
# odio_version may be 'unknown' or a git-describe string (not pep440); the common
# role version (always clean from vars/main.yml) is the release proxy.
- name: Determine if odio state dirs need creating
  ansible.builtin.set_fact:
    odios_create_state_dirs: >-
      {{ (odios_prior_role_versions['common'] | default('0'))
         is version('2026.5.0b1', '<', version_type='pep440') }}

- name: Ensure /var/lib/odio exists
  ansible.builtin.file:
    path: /var/lib/odio
    state: directory
    owner: root
    group: odio
    mode: '2750'
  become: true
  when: odios_create_state_dirs | bool

- name: Ensure /var/cache/odio exists
  ansible.builtin.file:
    path: /var/cache/odio
    state: directory
    owner: root
    group: odio
    mode: '2775'
  become: true
  when: odios_create_state_dirs | bool

# _odios_existing_state is read in pre_tasks (tasks/read_state.yml).
- name: Seed prior release history
  ansible.builtin.set_fact:
    _odios_prior_history: >-
      {{
        _odios_existing_state.release_history
        if _odios_existing_state.release_history is defined
        else (
          [_odios_existing_state.odios]
          if _odios_existing_state.odios is defined
          else []
        )
      }}

- name: Append current version to release history (dedup consecutive)
  ansible.builtin.set_fact:
    _odios_release_history: >-
      {{
        _odios_prior_history
        if (_odios_prior_history | length > 0
            and _odios_prior_history[-1] == odio_version)
        else _odios_prior_history + [odio_version]
      }}

# Refresh every installed role's version from vars/main.yml. RUN_X=N
# roles weren't re-installed but target == prior, so writing target is
# a no-op. Downgrades (`--force --version=<older>`) write a stale
# target — accepted, not a supported path.
- name: Read installed role versions from vars/main.yml
  ansible.builtin.set_fact:
    _odios_merged_role_versions: >-
      {{ _odios_merged_role_versions | default({}) | combine({
           item: (lookup('ansible.builtin.file', playbook_dir ~ '/roles/' ~ item ~ '/vars/main.yml') | from_yaml)[item ~ '_version']
         })
      }}
  loop: "{{ _odios_installed_roles }}"

- name: Assemble state.json payload
  ansible.builtin.set_fact:
    _odios_state:
      odios: "{{ odio_version }}"
      install_mode: "{{ install_mode }}"
      target_user: "{{ target_user }}"
      roles: "{{ _odios_merged_role_versions }}"
      roles_excluded: "{{ _odios_excluded_roles }}"
      features: "{{ _odios_enabled_features }}"
      features_excluded: "{{ _odios_excluded_features }}"
      release_history: "{{ _odios_release_history }}"

- name: Write /var/lib/odio/state.json
  ansible.builtin.copy:
    content: "{{ _odios_state | to_nice_json }}\n"
    dest: /var/lib/odio/state.json
    owner: root
    group: odio
    mode: '0640'
  become: true

# 2b1 wrote state.json under /var/cache; drop the stale copy now that
# /var/lib is canonical.
- name: Remove 2b1 /var/cache/odio/state.json after migration
  ansible.builtin.file:
    path: /var/cache/odio/state.json
    state: absent
  become: true
  when: odios_create_state_dirs | bool

- name: Refresh /var/cache/odio/upgrades.json
  ansible.builtin.command: /usr/local/bin/odio-upgrade check
  become: "{{ become_for_target_user }}"
  become_user: "{{ target_user }}"
  changed_when: false
  failed_when: false

---
- name: Reload dbus
  ansible.builtin.systemd:
    name: dbus.service
    state: reloaded
  become: true
  when: ansible_facts.services['dbus.service'] is defined

- name: Restart shairport-sync
  ansible.builtin.systemd:
    name: shairport-sync.service
    state: restarted
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ target_user_uid }}"
  become: "{{ become_for_target_user }}"
  become_user: "{{ target_user }}"
  when: install_mode == "live"

---
- name: Install mympd v{{ mpd_mympd_apt_version }}
  ansible.builtin.apt:
    name: "mympd>={{ mpd_mympd_apt_version }}"
    state: present
    install_recommends: false
  become: true
  notify: Restart mympd

- name: Create mympd config directory
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/mympd/config"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0700'
  become: "{{ become_for_target_user }}"

- name: Deploy odio custom_css
  ansible.builtin.copy:
    src: custom_css
    dest: "/home/{{ target_user }}/.config/mympd/config/custom_css"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0600'
  become: "{{ become_for_target_user }}"
  notify: Restart mympd

- name: Disable mympd ssl
  ansible.builtin.copy:
    content: "false"
    dest: "/home/{{ target_user }}/.config/mympd/config/ssl"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0600'
  become: "{{ become_for_target_user }}"
  notify: Restart mympd

- name: Create mympd state directory
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/mympd/state"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0700'
  become: "{{ become_for_target_user }}"

- name: Configure mympd MPD host (user socket)
  ansible.builtin.copy:
    content: "{{ mpd_socket_path }}"
    dest: "/home/{{ target_user }}/.config/mympd/state/mpd_host"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0600'
  become: "{{ become_for_target_user }}"
  notify: Restart mympd

- name: Configure mympd http port
  ansible.builtin.copy:
    content: "{{ mpd_mympd_http_port }}"
    dest: "/home/{{ target_user }}/.config/mympd/config/http_port"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0600'
  become: "{{ become_for_target_user }}"
  notify: Restart mympd

- name: Enable user mympd service
  ansible.builtin.include_tasks: "../../../tasks/systemd_enable_user.yml"
  vars:
    service_name: mympd.service

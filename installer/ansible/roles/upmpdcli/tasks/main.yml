---
- name: Download lesbonscomptes GPG key
  ansible.builtin.get_url:
    url: "https://www.lesbonscomptes.com/pages/lesbonscomptes.gpg"
    dest: /usr/share/keyrings/lesbonscomptes.gpg
    mode: '0644'
    owner: root
    group: root
  become: true

- name: Download upmpdcli apt sources
  ansible.builtin.get_url:
    url: "https://www.lesbonscomptes.com/upmpdcli/pages/upmpdcli-{% if ansible_architecture in ['armv6l', 'armv7l', 'aarch64'] %}r{% endif %}trixie.sources"
    dest: /etc/apt/sources.list.d/upmpdcli.sources
    mode: '0644'
    owner: root
    group: root
  become: true

- name: Install upmpdcli
  ansible.builtin.apt:
    name: upmpdcli
    state: present
    update_cache: true
  become: true
  notify: Restart upmpdcli

- name: Backup upmpdcli config before changes
  ansible.builtin.include_tasks: "../../../tasks/backup_conf_before.yml"
  vars:
    conf_path: /etc/upmpdcli.conf

- name: Configure upmpdcli friendly name
  ansible.builtin.lineinfile:
    path: /etc/upmpdcli.conf
    regexp: '^#?avfriendlyname\s*='
    line: "avfriendlyname = UpMpd/AV-{{ target_hostname }}"
  become: true
  notify: Restart upmpdcli

- name: Configure upmpdcli upnpav
  ansible.builtin.lineinfile:
    path: /etc/upmpdcli.conf
    regexp: '^#?upnpav\s*='
    line: "upnpav = 1"
  become: true
  notify: Restart upmpdcli

- name: Configure upmpdcli openhome
  ansible.builtin.lineinfile:
    path: /etc/upmpdcli.conf
    regexp: '^#?openhome\s*='
    line: "openhome = 1"
  become: true
  notify: Restart upmpdcli

- name: Configure upmpdcli mpdhost
  ansible.builtin.lineinfile:
    path: /etc/upmpdcli.conf
    regexp: '^#?mpdhost\s*='
    line: "mpdhost = localhost"
  become: true
  notify: Restart upmpdcli

- name: Configure upmpdcli mpdport
  ansible.builtin.lineinfile:
    path: /etc/upmpdcli.conf
    regexp: '^#?mpdport\s*='
    line: "mpdport = 6600"
  become: true
  notify: Restart upmpdcli

- name: Configure Qobuz streaming
  ansible.builtin.include_tasks: qobuz.yml
  when: qobuz_user is defined and qobuz_user | length > 0

- name: Configure Deezer streaming
  ansible.builtin.include_tasks: deezer.yml
  when: deezer_user is defined and deezer_user | length > 0

- name: Configure Tidal streaming
  ansible.builtin.include_tasks: tidal.yml
  when: install_tidal | bool

- name: Backup upmpdcli config after changes
  ansible.builtin.include_tasks: "../../../tasks/backup_conf_after.yml"
  vars:
    conf_path: /etc/upmpdcli.conf

- name: Ensure upmpdcli config is world-readable
  ansible.builtin.file:
    path: /etc/upmpdcli.conf
    mode: '0644'
    state: file
  become: true

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Disable upmpdcli system service
  ansible.builtin.systemd:
    name: upmpdcli.service
    enabled: false
    state: stopped
    daemon_reload: true
  become: true
  when: "'upmpdcli.service' in ansible_facts.services"

- name: Deploy upmpdcli user service
  ansible.builtin.copy:
    src: upmpdcli.service
    dest: "/usr/lib/systemd/user/upmpdcli.service"
    mode: '0644'
  become: true
  notify: Restart upmpdcli

- name: Enable user upmpdcli user service
  ansible.builtin.systemd:
    name: upmpdcli.service
    enabled: true
    scope: user
    daemon_reload: true
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ target_user_uid }}"
  become: true
  become_user: "{{ target_user }}"

---
name: ShellCheck

on:
  pull_request:
    paths:
      - 'installer/install.sh'
      - 'test.sh'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          additional_files: 'installer/install.sh test.sh'

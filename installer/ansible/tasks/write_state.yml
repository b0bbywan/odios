---
- name: Build list of installed roles
  ansible.builtin.set_fact:
    _odios_installed_roles: >-
      {{
        ['common', 'upgrade']
        + (['branding']        if install_branding        | bool else [])
        + (['pulseaudio']      if install_pulseaudio      | bool else [])
        + (['bluetooth']       if install_bluetooth       | bool else [])
        + (['mpd']             if install_mpd             | bool else [])
        + (['mpd_discplayer']  if install_mpd_discplayer  | bool else [])
        + (['shairport_sync']  if install_shairport_sync  | bool else [])
        + (['snapclient']      if install_snapclient      | bool else [])
        + (['upmpdcli']        if install_upmpdcli        | bool else [])
        + (['spotifyd']        if install_spotifyd        | bool else [])
        + (['odio_api']        if install_odio_api        | bool else [])
      }}

- name: Aggregate role versions from vars/main.yml
  ansible.builtin.set_fact:
    _odios_role_versions: >-
      {{
        _odios_role_versions | default({}) | combine({
          item: (lookup('ansible.builtin.file', playbook_dir ~ '/roles/' ~ item ~ '/vars/main.yml') | from_yaml)[item ~ '_version']
        })
      }}
  loop: "{{ _odios_installed_roles }}"

# Explicit list of roles the user opted out of, so a future upgrade can tell
# "deliberately excluded" (honor the choice) from "new role the install
# predates" (fall back to install.sh's default for that flag).
- name: Build list of excluded roles
  ansible.builtin.set_fact:
    _odios_excluded_roles: >-
      {{
        ['branding', 'pulseaudio', 'bluetooth', 'mpd', 'mpd_discplayer', 'shairport_sync',
         'snapclient', 'upmpdcli', 'spotifyd', 'odio_api']
        | difference(_odios_installed_roles)
      }}

# Same split for sub-flags: features holds opt-ins, features_excluded holds
# opt-outs. odio-upgrade reads both lists with pure opt-out semantics — only
# entries in features_excluded map to N, everything else (listed in features
# or absent from both) gets Y on upgrade.
- name: Build list of enabled features
  ansible.builtin.set_fact:
    _odios_enabled_features: >-
      {{
        (['tidal']         if install_tidal         | bool else [])
        + (['qobuz']         if install_qobuz         | bool else [])
        + (['upnpwebradios'] if install_upnpwebradios | bool else [])
        + (['mympd']         if install_mympd         | bool else [])
      }}

- name: Build list of excluded features
  ansible.builtin.set_fact:
    _odios_excluded_features: >-
      {{
        ['tidal', 'qobuz', 'upnpwebradios', 'mympd']
        | difference(_odios_enabled_features)
      }}

# setgid (2775) so files created by odio-check-upgrade as target_user inherit
# group `users` — needed for the timer to overwrite upgrades.json without sudo.
- name: Ensure /var/cache/odio exists
  ansible.builtin.file:
    path: /var/cache/odio
    state: directory
    owner: root
    group: users
    mode: '2775'
  become: true

# Release history: ordered chronological list of every odios version that ran
# write_state.yml. First install seeds it with [odio_version]; subsequent
# upgrades append (dedup-consecutive). Old state.json files without the field
# are backfilled from `odios` so we don't lose the pre-history version.
# Pre-rc4 wrote state.json into the target_user's home; rc4+ uses /var/cache.
- name: Read existing state.json (system path)
  ansible.builtin.slurp:
    src: /var/cache/odio/state.json
  register: _odios_existing_state_system
  become: true
  failed_when: false

- name: Read existing state.json (legacy per-user path)
  ansible.builtin.slurp:
    src: "/home/{{ target_user }}/.cache/odio/state.json"
  register: _odios_existing_state_legacy
  become: true
  failed_when: false
  when: _odios_existing_state_system.content is not defined

- name: Parse existing state
  ansible.builtin.set_fact:
    _odios_existing_state: >-
      {{
        (_odios_existing_state_system.content | b64decode | from_json)
        if _odios_existing_state_system.content is defined
        else (
          (_odios_existing_state_legacy.content | b64decode | from_json)
          if (_odios_existing_state_legacy.content | default('')) | length > 0
          else {}
        )
      }}

- name: Seed prior release history
  ansible.builtin.set_fact:
    _odios_prior_history: >-
      {{
        _odios_existing_state.release_history
        if _odios_existing_state.release_history is defined
        else (
          [_odios_existing_state.odios]
          if _odios_existing_state.odios is defined
          else []
        )
      }}

- name: Append current version to release history (dedup consecutive)
  ansible.builtin.set_fact:
    _odios_release_history: >-
      {{
        _odios_prior_history
        if (_odios_prior_history | length > 0
            and _odios_prior_history[-1] == odio_version)
        else _odios_prior_history + [odio_version]
      }}

- name: Assemble state.json payload
  ansible.builtin.set_fact:
    _odios_state:
      odios: "{{ odio_version }}"
      install_mode: "{{ install_mode }}"
      target_user: "{{ target_user }}"
      roles: "{{ _odios_role_versions }}"
      roles_excluded: "{{ _odios_excluded_roles }}"
      features: "{{ _odios_enabled_features }}"
      features_excluded: "{{ _odios_excluded_features }}"
      release_history: "{{ _odios_release_history }}"

- name: Write /var/cache/odio/state.json
  ansible.builtin.copy:
    content: "{{ _odios_state | to_nice_json }}\n"
    dest: /var/cache/odio/state.json
    owner: root
    group: users
    mode: '0664'
  become: true

- name: Refresh /var/cache/odio/upgrades.json
  ansible.builtin.command: /usr/local/bin/odio-check-upgrade
  become: true
  become_user: "{{ target_user }}"
  changed_when: false
  failed_when: false
